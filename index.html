<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Factory Dashboard</title>

  <!-- Firebase SDK -->
  <script src="[gstatic.com](https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js)"></script>
  <script src="[gstatic.com](https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js)"></script>
  <script src="[gstatic.com](https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js)"></script>

  <!-- Chart.js -->
  <script src="[cdn.jsdelivr.net](https://cdn.jsdelivr.net/npm/chart.js)"></script>

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --green: #22c55e;
      --red: #ef4444;
      --text: #fff;
    }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      margin: 0;
      padding: 10px;
    }

    h1 {
      text-align: center;
      margin: 20px 0;
      font-size: 1.8em;
    }

    #machines {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 20px;
      padding: 10px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
      transition: transform 0.2s;
    }

    .card:hover {
      transform: scale(1.02);
    }

    .status {
      font-weight: bold;
      margin-bottom: 8px;
    }

    .status.running { color: var(--green); }
    .status.stopped { color: var(--red); }

    .metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 10px;
    }

    .metric {
      flex: 1 1 100px;
      background: rgba(255,255,255,0.05);
      padding: 8px;
      border-radius: 6px;
      text-align: center;
      font-size: 14px;
    }

    canvas {
      width: 100% !important;
      height: 200px !important;
    }

    /* Mobile tweaks */
    @media (max-width: 600px) {
      h1 { font-size: 1.5em; }
      .metric { flex: 1 1 45%; }
    }
  </style>
</head>

<body>

<h1>Factory Machine Dashboard</h1>
<div id="machines"></div>

<script>
  // 🔹 Firebase Config
  const firebaseConfig = {
    apiKey: "AIzaSyAmkJO9jE4X2_83Jh3HIj701ldKJOfeGo0",
    databaseURL: "[knit-factory-monitor-default-rtdb.asia-southeast1.firebasedatabase.app](https://knit-factory-monitor-default-rtdb.asia-southeast1.firebasedatabase.app)"
  };

  firebase.initializeApp(firebaseConfig);

  // 🔹 Login session
  firebase.auth().signInWithEmailAndPassword("volthigh1@gmail.com", "Knit1234")
    .then(() => {
      console.log("Authenticated");
      const db = firebase.database().ref("machines");
      db.on("value", snapshot => renderMachines(snapshot.val() || {}));
    })
    .catch(err => alert("Login failed: " + err.message));

  // 🔹 Render UI
  function renderMachines(data) {
    const container = document.getElementById("machines");
    container.innerHTML = "";

    for (const id in data) {
      const m = data[id];
      const card = document.createElement("div");
      card.className = "card";

      const statusText = checkStatus(m);
      const statusClass = statusText.toLowerCase();

      const runHours = (m.run_time_sec || 0) / 3600;
      const stopHours = (m.stop_time_sec || 0) / 3600;
      const total = (m.run_time_sec || 0) + (m.stop_time_sec || 0);
      const efficiency = total > 0 ? ((m.run_time_sec / total) * 100).toFixed(1) : "0";

      card.innerHTML = `
        <h3>${id}</h3>
        <div class="status ${statusClass}">${statusText}</div>
        <div class="metrics">
          <div class="metric"><b>${m.rpm || 0}</b><br>RPM</div>
          <div class="metric"><b>${m.today_count || 0}</b><br>Today</div>
          <div class="metric"><b>${runHours.toFixed(2)}</b><br>Run hrs</div>
          <div class="metric"><b>${stopHours.toFixed(2)}</b><br>Stop hrs</div>
          <div class="metric"><b>${efficiency}%</b><br>Efficiency</div>
        </div>
        <div style="margin-top:10px; font-size:12px;">
          Last Update: ${m.last_update_time || "N/A"}
        </div>
        <canvas id="chart-${id}"></canvas>
      `;

      container.appendChild(card);
      drawChart(id, m);
    }
  }

  // 🔹 Status check
  function checkStatus(machine) {
    if (!machine.last_update_time)
      return "Unknown";

    const now = new Date();
    const last = new Date(machine.last_update_time.replace(" ", "T"));
    const diff = (now - last) / 1000;

    if (diff > 20) return "Offline";
    return machine.status ? "Running" : "Stopped";
  }

  // 🔹 Chart.js logic
  function drawChart(id, m) {
    const ctx = document.getElementById(`chart-${id}`);
    if (!ctx) return;
    new Chart(ctx, {
      type: 'doughnut',
      data: {
        labels: ['Run Time', 'Stop Time'],
        datasets: [{
          data: [m.run_time_sec || 0, m.stop_time_sec || 0],
          backgroundColor: ['#22c55e', '#ef4444'],
          borderWidth: 0,
        }]
      },
      options: {
        plugins: {
          legend: { display: false },
        },
        cutout: '70%',
      }
    });
  }
</script>

</body>
</html>
