<!DOCTYPE html>
<html>
<head>
  <title>Factory Dashboard</title>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <style>
    body {
      font-family: Arial;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      text-align: center;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    .running {
      border-left: 5px solid #22c55e;
    }

    .stopped {
      border-left: 5px solid #ef4444;
    }

    .title {
      font-size: 18px;
      margin-bottom: 10px;
      text-transform: uppercase;
    }

    .value {
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<h1>Factory Machine Dashboard</h1>

<div class="container" id="machines"></div>

<script>
  // 🔹 Firebase Config
  var firebaseConfig = {
    apiKey: "AIzaSyAmkJO9jE4X2_83Jh3HIj701ldKJOfeGo0",
    databaseURL: "https://knit-factory-monitor-default-rtdb.asia-southeast1.firebasedatabase.app"
  };

  // 🔹 Initialize Firebase (ONLY ONCE)
  firebase.initializeApp(firebaseConfig);

  // 🔹 Login
  firebase.auth().signInWithEmailAndPassword(
    "volthigh1@gmail.com",
    "Knit1234"
  )
  .then(() => {
    console.log("Login successful");

    var db = firebase.database();

    // 🔹 Listen for real-time updates
    db.ref("machines").on("value", function(snapshot) {

      let data = snapshot.val();
      console.log(data);

      let container = document.getElementById("machines");
      container.innerHTML = "";

      // If no data
      if (!data) {
        container.innerHTML = "<p>No machine data found</p>";
        return;
      }

      // 🔹 Loop through machines
      for (let id in data) {
        let m = data[id];

        let statusClass = m.status ? "running" : "stopped";
let statusText = m.status ? "Running" : "Stopped";

// 🔥 Check if machine offline
if (m.last_update_time) {
  let now = new Date();
  let last = new Date(m.last_update_time);

  let diff = (now - last) / 1000;

  if (diff > 10) {
    statusText = "Offline";
    statusClass = "stopped";
  }
}

       let card = `
  <div class="card ${statusClass}">
    <div class="title">${id}</div>
    <div>Status: ${statusText}</div>
    <div>RPM: <span class="value">${m.rpm}</span></div>
    <div>Count: ${m.count}</div>
    <div>Last Update: ${m.last_update_time || "N/A"}</div>
  </div>
`;

        container.innerHTML += card;
      }

    });

  })
  .catch(err => {
    console.error(err);
    alert("Login Failed: " + err.message);
  });
</script>

</body>
</html>
